{% extends 'base.html' %}

{% block title %}Connexion - Système Hospitalier{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="col-11 col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="card border-0 shadow-lg overflow-hidden rounded-4">
            <div class="card-header bg-primary text-white text-center py-4">
                <h3 class="mb-0 fw-bold"><i class="fas fa-hospital me-2"></i>Connexion au Système</h3>
                <p class="mb-0 opacity-75">Accédez à votre espace sécurisé</p>
            </div>

            <div class="card-body p-4 p-md-5">
                <form method="post" action="{% url 'login' %}" class="needs-validation" novalidate>
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label for="username" class="form-label fw-bold">Nom d'utilisateur</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control py-2" id="username" name="username" placeholder="Entrez votre nom d'utilisateur" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">Mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control py-2" id="password" name="password" placeholder="Entrez votre mot de passe" required>
                            <button type="button" class="btn btn-outline-secondary toggle-password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold py-2">
                            <i class="fas fa-sign-in-alt me-2"></i> Se connecter
                        </button>
                    </div>

                    <div class="position-relative text-center my-4">
                        <hr>
                        <span class="position-absolute top-50 translate-middle bg-white px-3 text-muted small">OU</span>
                    </div>

                    <div class="text-center">
                        <p class="mb-0">Vous n'avez pas de compte ?
                            <a href="{% url 'registration_choice' %}" class="fw-bold text-decoration-none">Créer un compte</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>


<script>
    document.addEventListener("DOMContentLoaded", function () {

        

        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', () => {
                const input = button.parentElement.querySelector('input');
                const icon = button.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });
        });
    });
</script>


<style>
    .card-header {
        border-radius: 1.5rem 1.5rem 0 0;
    }
    .card {
        border-radius: 1.5rem;
    }
    .input-group-text {
        border-radius: 0.5rem 0 0 0.5rem !important;
    }
    .toggle-password {
        border-radius: 0 0.5rem 0.5rem 0 !important;
    }
</style>
{% endblock %}
